# Source of truth for the M4 tick scheduler (replaces .github/workflows/*.yml crons).
# Times are America/New_York. commands = args appended after `uv run quant`.

[[job]]
name = "premarket-health"
trigger_et = "09:00"
days = "WEEKDAYS_TRADING"
catch_up = "SAME_DAY"
max_lateness = "14:00"
max_runtime_s = 1200
commands = [
  ["data", "refresh", "--start", "2018-01-01"],
  ["doctor"],
  ["governance", "status"],
  ["rebalance", "--dry-run"],
]
commit_paths = []

[[job]]
name = "daily-rebalance"
close_offset_min = 5
days = "WEEKDAYS_TRADING"
catch_up = "NONE"
timing_critical = true
max_lateness = "16:00"
max_runtime_s = 600
commands = [
  ["data", "refresh", "--start", "2018-01-01"],
  ["risk", "pretrade"],
  ["doctor"],
  # PAPER-LIVE as of cutover 2026-06-02: places REAL paper orders (fake money).
  # The premarket-health job above still runs `rebalance --dry-run` as a preview.
  # Re-add "--dry-run" here to return to a no-orders shakedown.
  ["rebalance"],
]
commit_paths = ["data/live/", "data/raw/", "data/ops/health/", "data/risk/"]

[[job]]
name = "posttrade-reconciliation"
trigger_et = "17:30"
days = "WEEKDAYS_TRADING"
catch_up = "SAME_DAY"
max_lateness = "23:59"
max_runtime_s = 600
commands = [["__script__", "scripts/reconcile_live.py"]]
commit_paths = ["docs/live-recon/"]

[[job]]
name = "daily-digest"
trigger_et = "17:45"
days = "WEEKDAYS_TRADING"
catch_up = "SAME_DAY"
max_lateness = "23:00"
max_runtime_s = 600
# Read-only Claude-written digest → Slack (E2). Runs after reconciliation;
# never trades. Commits the markdown artifact so git history is the digest log.
commands = [["analyst", "digest"]]
commit_paths = ["docs/analyst/"]

[[job]]
name = "daily-brief"
trigger_et = "17:50"
days = "WEEKDAYS_TRADING"
catch_up = "SAME_DAY"
max_lateness = "23:30"
max_runtime_s = 600
# Read-only Claude decision-maker (Phase A): richer context (regime + validation
# evidence + allocation + macro + execution) → structured advisory brief → Slack.
# Runs after the digest; never trades, sets no halt, applies nothing.
commands = [["analyst", "brief"]]
commit_paths = ["docs/analyst/"]

[[job]]
name = "nightly-backtest"
trigger_et = "22:00"
days = "TRADING_DAY_EVENING"
catch_up = "SAME_DAY"
max_lateness = "09:00"
max_lateness_next_day = true
max_runtime_s = 7200
commands = [["__backtest_matrix__", "--quick"]]
commit_paths = ["data/backtests/"]

[[job]]
name = "weekly-grid-search"
trigger_et = "02:00"
days = "SATURDAY"
catch_up = "SAME_DAY"
max_lateness = "23:59"
max_lateness_next_day = true
max_runtime_s = 28800
commands = [["__backtest_matrix__", "--full"]]
commit_paths = ["data/backtests/"]

[[job]]
name = "weekly-validation-governance"
trigger_et = "04:00"
days = "SATURDAY"
catch_up = "SAME_DAY"
max_lateness = "23:59"
max_lateness_next_day = true
max_runtime_s = 28800
commands = [["__validate_matrix__"], ["governance", "refresh"], ["governance", "status"]]
commit_paths = ["data/backtests/", "data/governance/"]
