name: weekly-grid-search

# Saturdays 06:00 UTC. Re-runs walk-forward with each strategy's full
# param_grid and commits the refreshed chosen_params.json so live rebalance
# picks up the latest best-by-Sharpe-per-window params automatically.
# Splitting this off the nightly job keeps nightly fast (defaults only) and
# this job slow-but-thorough on the weekend.
on:
  schedule:
    - cron: "0 6 * * 6"
  workflow_dispatch: {}

concurrency:
  group: weekly-grid-search
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  grid-search:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        slug: [momentum, multi-factor, pairs, trend, risk-parity]
    env:
      ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
      ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
      ALPACA_PAPER: "true"
      FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
      LOG_LEVEL: INFO
      SLUG: ${{ matrix.slug }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install deps
        run: uv sync --all-extras

      - name: Grid-search strategy
        run: uv run quant backtest "$SLUG" --start 2015-01-01

      - name: Upload tear-sheet artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tearsheet-grid-${{ matrix.slug }}
          path: data/backtests/${{ matrix.slug }}/

  commit:
    needs: grid-search
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: always()
    env:
      RUN_ID: ${{ github.run_id }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download all tear-sheets
        uses: actions/download-artifact@v4
        with:
          path: data/backtests/
          pattern: tearsheet-grid-*
          merge-multiple: false

      - name: Flatten download structure
        run: |
          shopt -s nullglob
          for d in data/backtests/tearsheet-grid-*; do
            slug=$(basename "$d" | sed 's/^tearsheet-grid-//')
            mkdir -p "data/backtests/$slug"
            mv "$d"/* "data/backtests/$slug/"
            rmdir "$d"
          done

      - name: Commit refreshed chosen-params + tear-sheets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/backtests/ 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No artifact changes."
            exit 0
          fi
          git commit -m "chore(grid): weekly chosen_params refresh $RUN_ID"
          git push
