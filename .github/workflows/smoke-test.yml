name: smoke-test

# Spec §8 deliverable. Runs `quant rebalance --dry-run` against synthetic bars
# + a stubbed Alpaca client every push/PR; asserts every per-strategy outcome
# is error-free. No Alpaca credentials required.
on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      ALPACA_API_KEY: ci-dummy
      ALPACA_SECRET_KEY: ci-dummy
      ALPACA_PAPER: "true"
      ALPACA_BASE_URL: https://paper-api.alpaca.markets
      FRED_API_KEY: ci-dummy
      LOG_LEVEL: INFO

    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: latest
          enable-cache: true
      - run: uv python install 3.12
      - run: uv sync --all-extras
      - name: Run smoke rebalance
        run: uv run python scripts/smoke_rebalance.py
