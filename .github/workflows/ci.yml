name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install deps
        run: uv sync --all-extras

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: mypy
        run: uv run mypy quant/

      - name: pytest
        env:
          # Dummy values so Settings() can instantiate inside tests that need it
          ALPACA_API_KEY: ci-dummy
          ALPACA_SECRET_KEY: ci-dummy
          ALPACA_PAPER: "true"
          FRED_API_KEY: ci-dummy
        run: uv run pytest -q --cov=quant --cov-report=xml -m "not network and not alpaca and not slow"

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
