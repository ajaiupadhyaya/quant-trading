name: weekly-validation-governance

# Weekly evidence refresh. Gate failures are expected for research strategies:
# this workflow records the evidence, refreshes governance, and commits the
# resulting artifacts so daily rebalance can fail closed or trade only live
# strategies with fresh validation.
on:
  schedule:
    - cron: "0 8 * * 6"
  workflow_dispatch: {}

concurrency:
  group: weekly-validation-governance
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  validate-governance:
    runs-on: ubuntu-latest
    timeout-minutes: 420
    env:
      ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
      ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
      ALPACA_PAPER: "true"
      ALPACA_BASE_URL: "https://paper-api.alpaca.markets"
      FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
      LOG_LEVEL: INFO
      RUN_ID: ${{ github.run_id }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install deps
        run: uv sync --all-extras

      - name: Refresh data cache
        run: uv run quant data refresh --start 2010-01-01

      - name: Validate all strategies with bounded runtime
        run: |
          set +e
          failed=0
          for slug in defensive-etf-allocation trend momentum risk-parity multi-factor pairs; do
            echo "::group::validate $slug"
            timeout 90m uv run quant validate "$slug" \
              --start 2010-01-01 \
              --bootstrap-resamples 5000 \
              --bootstrap-seed 0
            code=$?
            echo "validation_exit_code=$code"
            echo "::endgroup::"
            if [ "$code" -ne 0 ] && [ "$code" -ne 2 ]; then
              failed=1
            fi
          done
          exit "$failed"

      - name: Refresh governance
        run: uv run quant governance refresh

      - name: Print governance status
        run: uv run quant governance status

      - name: Upload governance artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: governance-artifacts-${{ github.run_id }}
          path: |
            data/backtests/
            data/governance/

      - name: Commit refreshed validation and governance artifacts
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/backtests/ data/governance/ 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No validation/governance changes."
            exit 0
          fi
          git commit -m "chore(governance): weekly validation refresh $RUN_ID"
          for attempt in 1 2 3; do
            git pull --rebase --autostash origin main && git push && exit 0
            echo "push attempt $attempt rejected (main moved); retrying in 5s"; sleep 5
          done
          echo "::error::push failed after 3 attempts"; exit 1
